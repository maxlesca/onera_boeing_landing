# Arm 2 of the encoder study: Tudor's ConvBlock in front of the CfC, dieted from
# output_dim 256 to 64 (214,984 parameters against 44,424 for the bare CfC --
# still 77% of the network in the front end).
# Kept for comparability with the earlier pipelines, not because it is expected
# to win: its kernel slides over the FEATURE axis (in_channels = seq_len), which
# imposes weight sharing between unrelated physical quantities, and on Tudor's
# own quadrotor it made the CfC 2.3x worse (DOC 8.19.6).
# sequencing must be on: the conv path consumes (batch, time, seq_len, features).

extends: base.yaml

conv_block:
  value: true
  output_dim: 64
sequencing:
  value: true
  seq_len: 1
