model_path: "mlp_epoch=19_val_loss=0.003130.ckpt"  # Saved checkpoint/config stem from training

dataset:  # Dataset used by the dataset-initialized simulator
  path_sim: datasets/hover_dataset_test.npz

seed: 42  # Random seed for random-start simulations
sensitivity_analysis: true
number_simulations: 100  # Number of sampled starts for Simulator_random_start.py
show_sim: false  # Enable plotting/visualization

simulation:  # Shared closed-loop simulator settings
  time_simulation: 4.0
  dt: 0.01
  error: 0.5
  dist_error: 0.25
  vel_error: 0.25
  ang_error: 0.3
  integration_method: rk4   # explicit | euler | rk4 | adams-bashforth | adams-moulton | implicit
  implicit_iterations: 1
  save_file: false
