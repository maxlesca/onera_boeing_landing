# Configuration d'entraînement CfC ATTERRISSAGE (train_landing_cfc.py)
# Même schéma que train_config.yaml (Tudor) ; seule la section dataset diffère.

training:
  max_epochs: 20
  lr: 0.001
  logger: false
  seed: 42

dataset:
  # PRODUIT PAR LE GRAND RUN (pose_v8 sur les 16 184 images, --n 1) :
  detections_csv: ../resultats/full_run_pose/sortie_yolo/detections.csv

  # Les npz produits par dataset_preparation/csv_to_npz.py --sans-ils :
  # ils portent DÉJÀ le split par run (train = 2/4/7/17, val = 8), les lignes
  # NaN écartées, les colonnes ILS exclues, ET les bornes de normalisation
  # calculées sur le train seul. L'entraînement ne touche jamais aux images ni
  # au zip : detections_csv (vision pré-calculée) + npz (capteurs/labels).
  train_npz: ../datasets/no_ils/landing_train.npz
  val_npz: ../datasets/no_ils/landing_val.npz

  image_size: [1920, 991]   # résolution APRÈS crop 47/42 (celle des detections)

  # fenêtres servies au CfC : 64 pas à 25 Hz = 2.56 s de contexte,
  # découpées PAR RUN (jamais à cheval), stride 16 (recouvrement 75 %)
  seq_len: 64
  stride: 16
  normalized: true
  # entrées = [10 canaux vision : 8 coins normalisés + confiance + validité]
  #           + [12 capteurs du npz : attitude, p/q/r, vitesses corps et NED]
  # sorties = les 5 commandes du npz : longitudinal, lateral, directional,
  #           stabilizer, throttle_left (rien n'est exclu — l'ordre vient du npz)

# pas de pré-traitement : les coins bruts entrent directement (DOC §9.8)
mlp_block:
  value: false
conv_block:
  value: false

dataloader:
  batch_size: 32
  num_workers: 0            # Windows : 0 évite les soucis de spawn
  pin_memory: false
  drop_last: true

model:
  type: cfc                 # le gated CfC (DOC §5.2, §7.7.3)
  cfc_mode: default
  no_neurons_layer: 64      # l'optimum du papier CODIT26
  backbone_units: 128
  backbone_layers: 1
  backbone_dropout: 0.0
  activation: lecun_tanh
  mixed_memory: false
  scale_factor: 1.0

checkpoint_name: null       # auto : landing_cfc_default_n64_...
